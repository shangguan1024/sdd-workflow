quality:
  enabled: true
  profile: "standard"
  
  profiles:
    standard:
      thresholds:
        code_quality: 70.0
        test_coverage: 60.0
        complexity: 10.0
        convention: 70.0
      weights:
        code_metrics: 1.5
        test_coverage: 1.5
        complexity: 1.0
        convention: 1.0
    
    integration:
      thresholds:
        code_quality: 70.0
        test_coverage: 70.0
        complexity: 10.0
        convention: 70.0
      weights:
        code_metrics: 1.5
        test_coverage: 2.0
        complexity: 1.0
        convention: 1.0
    
    review:
      thresholds:
        code_quality: 80.0
        test_coverage: 75.0
        complexity: 8.0
        convention: 80.0
      weights:
        code_metrics: 2.0
        test_coverage: 2.0
        complexity: 1.5
        convention: 1.5
    
    strict:
      thresholds:
        code_quality: 85.0
        test_coverage: 80.0
        complexity: 7.0
        convention: 85.0
      weights:
        code_metrics: 2.0
        test_coverage: 2.0
        complexity: 1.5
        convention: 1.5
    
    relaxed:
      thresholds:
        code_quality: 50.0
        test_coverage: 40.0
        complexity: 15.0
        convention: 50.0
      weights:
        code_metrics: 1.0
        test_coverage: 1.0
        complexity: 0.5
        convention: 0.5
  
  collectors:
    code_metrics:
      enabled: true
      metrics:
        - lines_of_code
        - cyclomatic_complexity
        - maintainability_index
    
    test_coverage:
      enabled: true
      minimum_threshold: 60.0
    
    complexity:
      enabled: true
      maximum_threshold: 10.0
    
    convention:
      enabled: true
      checks:
        - naming_conventions
        - docstring_presence
        - type_annotations
  
  gate_engine:
    enabled: true
    strict_mode: false
    allow_override: true
  
  reporter:
    enabled: true
    format: "markdown"
    output_dir: "docs/quality_reports"